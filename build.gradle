plugins {
    id 'fabric-loom' version '1.6-SNAPSHOT'
    id 'java'
}

version = '1.0.0'
group = 'com.onefizz'

base { archivesName = 'onefizz' }

loom {
    accessWidenerPath = file('src/main/resources/onefizz.accesswidener')
}

repositories {
    mavenCentral()
    maven { url 'https://maven.fabricmc.net/' }
}

dependencies {
    minecraft 'com.mojang:minecraft:1.21'
    mappings 'net.fabricmc:yarn:1.21+build.2:v2'
    modImplementation 'net.fabricmc:fabric-loader:0.15.11'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.100.4+1.21'

    modImplementation 'io.github.spair:imgui-java-app:1.86.11'
    modImplementation 'io.github.spair:imgui-java-binding:1.86.11'
    include 'io.github.spair:imgui-java-app:1.86.11'
    include 'io.github.spair:imgui-java-binding:1.86.11'
    include 'io.github.spair:imgui-java-lwjgl3:1.86.11'
    include 'io.github.spair:imgui-java-natives-windows:1.86.11'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

processResources {
    inputs.property 'version', project.version
    filesMatching('fabric.mod.json') {
        expand 'version': project.version
    }
}
